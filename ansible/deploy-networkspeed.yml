---
- name: Deploy network-speed-service app
  hosts: networkspeed
  vars:
    project_dir: /root/Projects/network-speed
    frontend_dir: /root/Projects/network-speed/frontend
    origin: https://github.com/panksy2k/network-speed-service.git

  tasks:
    - name: Check if swap file exists
      stat:
        path: /swapfile
      register: swap_file_check

    - name: Create swap file
      command: fallocate -l 2G /swapfile
      when: not swap_file_check.stat.exists

    - name: Set permissions on swap file
      file:
        path: /swapfile
        mode: '0600'
      when: not swap_file_check.stat.exists

    - name: Make swap
      command: mkswap /swapfile
      when: not swap_file_check.stat.exists

    - name: Enable swap
      command: swapon /swapfile
      when: not swap_file_check.stat.exists
    - name: Install dependencies for SDKMAN
      package:
        name:
          - curl
          - zip
          - unzip
        state: present

    - name: Install SDKMAN
      shell: curl -s "https://get.sdkman.io" | bash
      args:
        creates: /root/.sdkman/bin/sdkman-init.sh

    - name: Install Java 17.0.18-amzn
      shell: |
        source /root/.sdkman/bin/sdkman-init.sh
        sdk install java 17.0.18-amzn
        sdk default java 17.0.18-amzn
      args:
        executable: /bin/bash

    - name: Install Maven
      shell: |
        source /root/.sdkman/bin/sdkman-init.sh
        sdk install maven 3.9.0
      args:
        executable: /bin/bash

    - name: Pull latest code from git
      git:
        repo: "{{ origin }}"
        dest: "{{ project_dir }}"
        version: main
        update: yes
        force: yes
      ignore_errors: no

    - name: Clean existing frontend node_modules
      file:
        path: "{{ frontend_dir }}/node_modules"
        state: absent

    - name: Frontend install dependencies
      shell: npm install
      args:
        chdir: "{{ frontend_dir }}"

    - name: Build frontend with npm
      shell: npm run build
      args:
        chdir: "{{ frontend_dir }}"

    - name: Build backend with Maven
      shell: /root/.sdkman/candidates/maven/current/bin/mvn clean package -DskipTests
      args:
        chdir: "{{ project_dir }}"
      environment:
        JAVA_HOME: /root/.sdkman/candidates/java/current

    - name: Kill existing NetworkSpeedMainVerticle process
      shell: pkill -f "network-speed-service" || true
      ignore_errors: yes

    - name: Kill existing Vite preview process
      shell: pkill -f "vite preview" || true
      ignore_errors: yes

    - name: Wait for process to terminate
      pause:
        seconds: 3

    - name: Start the application
      shell: |
        nohup /root/.sdkman/candidates/java/current/bin/java -jar target/network-speed-service-1.0.0-SNAPSHOT.jar > /tmp/networkspeed.log 2>&1 &
      args:
        chdir: "{{ project_dir }}"
      environment:
        JAVA_HOME: /root/.sdkman/candidates/java/current
      async: 10
      poll: 0

    - name: Verify application started
      shell: sleep 5 && ps -ef | grep -i "network-speed-service" | grep -v grep
      register: process_check
      ignore_errors: yes

    - name: Display process status
      debug:
        msg: "Application started successfully"
      when: process_check.rc == 0

    - name: Run (or preview) the frontend on Vite preview server
      shell: |
        nohup npm run preview -- --host > /tmp/frontend-preview.log 2>&1 &
      args:
        chdir: "{{ frontend_dir }}"
      async: 10
      poll: 0
